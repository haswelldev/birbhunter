name: Release Electron Apps

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_script: build:electron-win
          - os: macos-latest
            platform: mac
            build_script: build:electron-mac
          - os: ubuntu-latest
            platform: linux
            build_script: build:electron-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Add Electron Platform
        run: npx cordova platform add electron

      - name: Build Electron App
        run: npm run ${{ matrix.build_script }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: birb-hunter-${{ matrix.platform }}
          path: platforms/electron/build/*.{exe,dmg,zip,AppImage,deb,rpm}
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
